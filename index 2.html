<script>
// ═══════════════════════════════════════
// ALGORITMOS
// ═══════════════════════════════════════
const ROWS=8,COLS=8,S=[0,0],G=[7,7];
const OBS=new Set(["1,1","1,2","1,3","2,5","3,5","4,5","3,1","3,2","5,2","5,3","5,4","6,6","4,3"]);
const rc=(r,c)=>`${r},${c}`;
const inObs=(r,c)=>OBS.has(rc(r,c));
const canGo=(r,c)=>r>=0&&r<ROWS&&c>=0&&c<COLS&&!inObs(r,c);
const DIRS=[[-1,0],[1,0],[0,-1],[0,1]];
const nbrs=(r,c)=>DIRS.map(([a,b])=>[r+a,c+b]).filter(([a,b])=>canGo(a,b));
const hMan=(r,c)=>Math.abs(r-G[0])+Math.abs(c-G[1]);
const hInf=(r,c)=>2*hMan(r,c);

function runAS(hFn){
  const g={},f={},par={},op=new Set(),cl=new Set(),steps=[];
  const s=rc(...S);g[s]=0;f[s]=hFn(...S);par[s]=null;op.add(s);
  while(op.size){
    let cur=null,mf=Infinity;
    for(const x of op)if(f[x]<mf){mf=f[x];cur=x;}
    const[cr,cc]=cur.split(',').map(Number);
    if(cr===G[0]&&cc===G[1]){
      const path=[];let x=cur;
      while(x!==null){path.unshift(x);x=par[x];}
      steps.push({t:'done',cur,path,g:g[cur],h:hFn(cr,cc),f:f[cur],op:[...op],cl:[...cl]});
      return steps;
    }
    op.delete(cur);cl.add(cur);
    const sc=[];
    for(const[nr,nc]of nbrs(cr,cc)){
      const nk=rc(nr,nc);if(cl.has(nk))continue;
      const ng=g[cur]+1;
      if(!op.has(nk)||ng<(g[nk]??Infinity)){
        g[nk]=ng;f[nk]=ng+hFn(nr,nc);par[nk]=cur;op.add(nk);
        sc.push({k:nk,r:nr,c:nc,g:ng,h:hFn(nr,nc),f:ng+hFn(nr,nc)});
      }
    }
    steps.push({t:'exp',cur,cr,cc,g:g[cur],h:hFn(cr,cc),f:f[cur],sc,op:[...op],cl:[...cl]});
  }
  return steps;
}

function runGR(hFn){
  const hv={},par={},op=new Set(),cl=new Set(),steps=[];
  const s=rc(...S);hv[s]=hFn(...S);par[s]=null;op.add(s);
  while(op.size){
    let cur=null,mh=Infinity;
    for(const x of op)if(hv[x]<mh){mh=hv[x];cur=x;}
    const[cr,cc]=cur.split(',').map(Number);
    if(cr===G[0]&&cc===G[1]){
      const path=[];let x=cur;
      while(x!==null){path.unshift(x);x=par[x];}
      steps.push({t:'done',cur,path,g:path.length-1,op:[...op],cl:[...cl]});
      return steps;
    }
    op.delete(cur);cl.add(cur);
    for(const[nr,nc]of nbrs(cr,cc)){
      const nk=rc(nr,nc);if(cl.has(nk)||op.has(nk))continue;
      hv[nk]=hFn(nr,nc);par[nk]=cur;op.add(nk);
    }
    steps.push({t:'exp',cur,cr,cc,op:[...op],cl:[...cl]});
  }
  return steps;
}

function bfsReal(r0,c0){
  const q=[[r0,c0,0]],v=new Set([rc(r0,c0)]);
  while(q.length){
    const[r,c,d]=q.shift();
    if(r===G[0]&&c===G[1])return d;
    for(const[nr,nc]of nbrs(r,c)){const nk=rc(nr,nc);if(!v.has(nk)){v.add(nk);q.push([nr,nc,d+1]);}}
  }
  return Infinity;
}

// Precalcular
const asManSteps=runAS(hMan);
const asInfSteps=runAS(hInf);
const grSteps=runGR(hMan);

// ═══════════════════════════════════════
// ESTADO DE LA APP
// ═══════════════════════════════════════
let currentPhase=0;
const stepIndexes={3:0,4:0,5:0};

const PHASES=[
  {label:'Bienvenida'},
  {label:'El Problema'},
  {label:'g · h · f'},
  {label:'A* Paso a Paso'},
  {label:'A* vs Greedy'},
  {label:'Heurística ×2'},
  {label:'Admisibilidad'},
  {label:'Consistencia'},
  {label:'Resumen'},
];

// ═══════════════════════════════════════
// HELPERS DOM
// ═══════════════════════════════════════
const C={
  amber:'#f59e0b',green:'#22c55e',blue:'#3b82f6',purple:'#8b5cf6',
  cyan:'#06b6d4',lime:'#84cc16',pink:'#ec4899',orange:'#f97316',
  red:'#ef4444',text:'#e2e8f0',muted:'#475569'
};

function h(tag,attrs={},children=[]){
  const el=document.createElement(tag);
  for(const[k,v]of Object.entries(attrs)){
    if(k==='style'&&typeof v==='object'){Object.assign(el.style,v);}
    else if(k==='class'){el.className=v;}
    else if(k.startsWith('on')){el.addEventListener(k.slice(2).toLowerCase(),v);}
    else{el.setAttribute(k,v);}
  }
  for(const c of children){
    if(c==null)continue;
    if(typeof c==='string'||typeof c==='number'){el.appendChild(document.createTextNode(c));}
    else if(c instanceof Node){el.appendChild(c);}
  }
  return el;
}

function div(attrs,children){return h('div',attrs,children);}
function span(attrs,children){return h('span',attrs,children);}
function txt(s){return document.createTextNode(s);}

function makeGrid(step={},path=[],sz=36){
  const ps=new Set(path),op=new Set(step.op||[]),cl=new Set(step.cl||[]),cur=step.cur;
  const grid=div({class:'grid',style:{gridTemplateColumns:`repeat(${COLS},${sz}px)`}},[]);
  for(let r=0;r<ROWS;r++){
    for(let c=0;c<COLS;c++){
      const kk=rc(r,c);
      const isSt=r===S[0]&&c===S[1],isGo=r===G[0]&&c===G[1];
      const isO=inObs(r,c),isCur=cur===kk;
      const isPath=ps.has(kk)&&!isSt&&!isGo;
      const isOp=op.has(kk)&&!isCur&&!isSt&&!isGo;
      const isCl=cl.has(kk)&&!isCur&&!isSt&&!isGo;
      let bg='#0d0d1a',border='1px solid rgba(255,255,255,0.03)',content='',color='rgba(255,255,255,0.5)';
      if(isO){bg='#181828';content='▪';color='#2a2a45';}
      else if(isSt){bg=C.amber;content='S';color='#000';}
      else if(isGo){bg=C.green;content='G';color='#000';}
      else if(isCur){bg=C.cyan;border=`2px solid ${C.cyan}`;color='#000';}
      else if(isPath){bg=C.lime;color='#000';}
      else if(isOp){bg='rgba(139,92,246,0.2)';border=`1px solid ${C.purple}`;}
      else if(isCl){bg='rgba(59,130,246,0.18)';border='1px solid rgba(59,130,246,0.3)';}
      const cell=div({
        class:'cell',
        title:`(${r},${c})`,
        style:{width:sz+'px',height:sz+'px',background:bg,border,
               fontSize:(sz>28?10:8)+'px',color,fontFamily:"'Courier New',monospace"}
      },[content]);
      grid.appendChild(cell);
    }
  }
  return grid;
}

function makeLegend(){
  const items=[
    ['#f59e0b','Inicio (S)',null],['#22c55e','Meta (G)',null],[C.cyan,'Actual',null],
    ['rgba(139,92,246,0.2)','Open list',C.purple],['rgba(59,130,246,0.18)','Closed list','rgba(59,130,246,0.5)'],
    [C.lime,'Camino final',null],['#181828','Obstáculo',null]
  ];
  return div({class:'legend'},items.map(([bg,lbl,bd])=>
    div({class:'legend-item'},[
      div({class:'legend-dot',style:{background:bg,border:bd?`1px solid ${bd}`:'none'}},[]),
      span({class:'legend-lbl'},[lbl])
    ])
  ));
}

function makePrompt(html){
  const box=div({class:'prompt-box'},[
    div({class:'prompt-label'},['💡 PROMPT DIDÁCTICO — Lee esto antes de avanzar']),
    div({class:'prompt-text'},[])
  ]);
  box.querySelector('.prompt-text').innerHTML=html;
  return box;
}

function makeInfoBox(color,label,html){
  const box=div({class:'info-box',style:{background:`${color}12`,border:`1px solid ${color}30`,borderLeft:`3px solid ${color}`}},[
    div({class:'info-label',style:{color}},[label]),
    div({class:'info-text'},[])
  ]);
  box.querySelector('.info-text').innerHTML=html;
  return box;
}

function makeStepNav(phase,steps){
  const idx=stepIndexes[phase];
  const max=steps.length-1;
  const nav=div({class:'step-nav'},[]);
  const actions=[['⏮',0,idx===0],['← Ant',Math.max(0,idx-1),idx===0],
                 ['Sig →',Math.min(max,idx+1),idx===max],['⏭',max,idx===max]];
  actions.forEach(([lbl,val,disabled],i)=>{
    const btn=h('button',{
      class:'step-btn',
      style:{
        background:i===2?C.amber:'#111125',
        color:i===2?'#000':C.text,
        border:`1px solid ${i===2?C.amber:'#1a1a35'}`,
        opacity:disabled?'0.3':'1',
        cursor:disabled?'not-allowed':'pointer'
      }
    },[lbl]);
    if(!disabled)btn.addEventListener('click',()=>{stepIndexes[phase]=val;renderPhase();});
    nav.appendChild(btn);
  });
  nav.appendChild(span({style:{color:C.muted,fontSize:'10px',fontFamily:"'Courier New',monospace",marginLeft:'4px'}},[`Paso ${idx+1} / ${max+1}`]));
  return nav;
}

function makeTable(headers,rows,colWidths){
  const tbl=h('table',{class:'',style:{fontSize:'11px',fontFamily:"'Courier New',monospace"}},[]);
  const thead=h('thead',{},[]);
  const tr=h('tr',{class:'tbl-head'},[]);
  headers.forEach(hd=>tr.appendChild(h('th',{},[hd])));
  thead.appendChild(tr);
  tbl.appendChild(thead);
  const tbody=h('tbody',{},[]);
  rows.forEach((row,ri)=>{
    const tr2=h('tr',{class:'tbl-body'},[]);
    row.forEach((cell,ci)=>{
      const td=h('td',{style:{color:cell.color||C.muted}},[]);
      td.innerHTML=cell.html||cell.text||'';
      if(cell.bold)td.style.fontWeight='700';
      tr2.appendChild(td);
    });
    tbody.appendChild(tr2);
  });
  tbl.appendChild(tbody);
  return tbl;
}

// ═══════════════════════════════════════
// RENDERIZADORES DE FASE
// ═══════════════════════════════════════

function renderP0(){
  const items=[['📦','Estados & acciones'],['🧮','g(n), h(n), f(n)'],
    ['🗺️','A* paso a paso'],['⚡','A* vs Greedy Best-First'],
    ['🔀','Heurística inflada h₂=2×h'],['✅','Admisibilidad'],
    ['🔗','Consistencia'],['📊','Comparativa final']];
  return div({style:{textAlign:'center',padding:'20px 0'}},[
    div({style:{fontSize:'52px',marginBottom:'12px'}},['🏭']),
    div({style:{color:C.amber,fontFamily:"'Courier New',monospace",fontSize:'22px',fontWeight:'700',letterSpacing:'2px',marginBottom:'8px'}},['TALLER A* — PICKING EN ALMACÉN']),
    div({style:{color:C.muted,fontSize:'12px',marginBottom:'6px'}},['Sesiones 7 & 8 · Búsqueda Informada y Diseño de Heurísticas']),
    div({style:{color:C.muted,fontSize:'11px',marginBottom:'24px'}},['Grado en Analítica de Negocio · UNIE Universidad']),
    div({class:'welcome-grid'},items.map(([ic,tx])=>
      div({class:'welcome-item'},[
        span({style:{fontSize:'16px'}},[ic]),
        span({style:{color:C.text,fontSize:'12px'}},[tx])
      ])
    )),
    div({style:{color:C.muted,fontSize:'12px',fontFamily:"'Courier New',monospace"}},[
      'Pulsa ',span({style:{color:C.amber}},['Siguiente →']),' para comenzar'
    ])
  ]);
}

function renderP1(){
  const fields=[
    ['ESTADO','Posición del operario (fila, columna) en rejilla 8×8'],
    ['ACCIONES','Moverse ↑ ↓ ← → (4-direccional, sin diagonales)'],
    ['ESTADO INICIAL','(0,0) — esquina superior izquierda'],
    ['ESTADO OBJETIVO','(7,7) — esquina inferior derecha'],
    ['COSTE DE ACCIÓN','1 unidad por cada movimiento ortogonal'],
    ['RESTRICCIONES','No cruzar obstáculos (estanterías) ni salir del mapa'],
  ];
  const left=div({},[makeGrid({},[],36),makeLegend()]);
  const right=div({style:{flex:'1',minWidth:'240px'}},[
    ...fields.map(([k,v])=>div({class:'field-row'},[
      div({class:'field-key'},[k]),
      div({class:'field-val'},[v])
    ])),
    div({style:{marginTop:'10px'}},[makeInfoBox(C.green,'PREGUNTA GUÍA',
      'Si el algoritmo pudiera "ver" el mapa completo, ¿qué información útil le darías para no explorar caminos inútiles? → Esa información es la <strong>heurística h(n)</strong>.'
    )])
  ]);
  return div({},[
    makePrompt('Antes de ejecutar cualquier algoritmo, debemos <strong>modelar el problema como espacio de estados</strong>. Un operario robot parte de <strong>S=(0,0)</strong> y debe llegar a <strong>G=(7,7)</strong> sorteando estanterías. ¿Cómo lo representarías formalmente? Intenta definir los campos antes de leerlos.'),
    div({class:'two-col'},[left,right])
  ]);
}

function renderP2(){
  const vars=[
    {id:'g(n)',col:C.blue,ic:'📏',ti:'Coste acumulado',
     desc:'Coste total desde el inicio hasta n. Se conoce con exactitud — es el camino ya recorrido.',
     ex:'g(S) = 0\ng(1 paso desde S) = 1\ng(nodo a 5 pasos) = 5'},
    {id:'h(n)',col:C.purple,ic:'🎯',ti:'Heurística estimada',
     desc:'Estimación del coste restante. No es exacta. Usamos Distancia Manhattan: |r−7| + |c−7|.',
     ex:'h(0,0) = |0−7|+|0−7| = 14\nh(3,3) = |3−7|+|3−7| = 8\nh(7,6) = |7−7|+|6−7| = 1'},
    {id:'f(n)',col:C.amber,ic:'⚖️',ti:'Prioridad total',
     desc:'A* siempre expande el nodo con menor f. Balancea el camino recorrido con el estimado restante.',
     ex:'f(0,0) = 0+14 = 14\nf(1,0) = 1+13 = 14\nf(0,1) = 1+13 = 14'},
  ];
  const left=div({style:{flex:'1',minWidth:'240px'}},vars.map(v=>{
    const card=div({class:'var-card',style:{borderColor:v.col,borderLeftWidth:'3px',borderTopColor:v.col+'40',borderRightColor:v.col+'40',borderBottomColor:v.col+'40'}},[
      div({class:'var-head'},[
        span({style:{fontSize:'16px'}},[v.ic]),
        span({class:'var-id',style:{color:v.col}},[v.id]),
        span({class:'var-ti'},[' — '+v.ti])
      ]),
      div({class:'var-desc'},[v.desc]),
      h('pre',{class:'var-ex',style:{color:v.col}},[v.ex])
    ]);
    return card;
  }));
  const formula=div({class:'card',style:{fontFamily:"'Courier New',monospace",marginBottom:'12px'}},[
    div({style:{fontSize:'9px',color:C.muted,letterSpacing:'2px',marginBottom:'12px'}},['FÓRMULA MANHATTAN']),
    div({style:{color:C.purple,fontSize:'17px',marginBottom:'4px'}},['h(r,c) = |r−7| + |c−7|']),
    div({style:{fontSize:'9px',color:C.muted,margin:'14px 0 10px',borderTop:'1px solid #1a1a35',paddingTop:'12px',letterSpacing:'1px'}},['EJEMPLO — NODO (2,3)']),
    div({style:{color:C.blue,fontSize:'12px',marginBottom:'3px'}},['g(2,3) = 5 pasos desde S']),
    div({style:{color:C.purple,fontSize:'12px',marginBottom:'3px'}},['h(2,3) = |2−7|+|3−7| = 9']),
    div({style:{color:C.amber,fontSize:'20px',fontWeight:'700',marginTop:'6px'}},['f(2,3) = 5+9 = 14'])
  ]);
  const right=div({style:{minWidth:'220px'}},[
    formula,
    makeInfoBox(C.cyan,'REGLA DE EXPANSIÓN','A* siempre expande el nodo con <strong>menor f(n)</strong> en la Open List. Si hay empate, se elige por menor h(n). Nunca expande un nodo subóptimo si hay uno mejor.')
  ]);
  return div({},[
    makePrompt('A* combina dos fuentes de información: el <strong>coste ya pagado g(n)</strong> (exacto) y la <strong>estimación del coste restante h(n)</strong> (heurística). Juntos forman la prioridad <strong>f(n) = g(n) + h(n)</strong>. Analiza cada variable y calcula el ejemplo a mano antes de continuar.'),
    div({class:'two-col'},[left,right])
  ]);
}

        div({class:'stats-grid'},[

function makeStatCard(label,value,color){
  return div({class:'stat-card'},[
    div({class:'stat-val',style:{color}},[value]),
    div({class:'stat-lbl'},[label])
  ]);
}

function renderDualStep(phase,stepsA,stepsB,lblA,lblB,colA,colB){
  const idx=stepIndexes[phase];
  const max=Math.max(stepsA.length,stepsB.length)-1;
  const stA=stepsA[Math.min(idx,stepsA.length-1)];
  const stB=stepsB[Math.min(idx,stepsB.length-1)];
  const lastA=stepsA[stepsA.length-1];
  const lastB=stepsB[stepsB.length-1];
  const pathA=stA.t==='done'?stA.path:[];
  const pathB=stB.t==='done'?stB.path:[];

  function makePanel(lbl,col,st,path,last){
    return div({style:{flex:'1',minWidth:'230px'}},[
      div({class:'card',style:{borderLeft:`3px solid ${col}`,borderColor:`${col}40`,marginBottom:'8px'}},[
        div({style:{color:col,fontFamily:"'Courier New',monospace",fontSize:'12px',fontWeight:'700'}},[lbl]),
        last.t==='done'?div({style:{color:C.muted,fontSize:'10px',fontFamily:"'Courier New',monospace",marginTop:'3px'}},[`Coste: ${last.g} · Explorados: ${last.cl.length}`]):null
      ].filter(Boolean)),
      makeGrid(st,path,27)
    ]);
  }

  const showTable=idx===max;
  return div({},[
    div({class:'three-col',style:{marginBottom:'10px'}},[
      makePanel(lblA,colA,stA,pathA,lastA),
      makePanel(lblB,colB,stB,pathB,lastB)
    ]),
    makeStepNav(phase,{length:max+1}),
    showTable?buildCompareTable(phase,lastA,lastB,colA,colB):null
  ].filter(Boolean));
}

function buildCompareTable(phase,lastA,lastB,colA,colB){
  if(phase===4){
    const rows=[
      [{text:'Coste de la solución',color:C.muted},{text:lastA.g,color:C.cyan,bold:true},{text:lastB.g,color:C.orange,bold:true}],
      [{text:'Nodos explorados',color:C.muted},{text:lastA.cl.length,color:C.cyan,bold:true},{text:lastB.cl.length,color:C.orange,bold:true}],
      [{text:'¿Garantiza el óptimo?',color:C.muted},{html:'<span style="color:#22c55e;font-weight:700">✓ Siempre</span>'},{html:'<span style="color:#ef4444;font-weight:700">✗ No</span>'}],
    ];
    const t=div({class:'card',style:{marginTop:'14px'}},[
      div({style:{fontSize:'9px',color:C.muted,fontFamily:"'Courier New',monospace",marginBottom:'10px',letterSpacing:'2px'}},['COMPARATIVA FINAL']),
      makeTable(['Métrica','A*','Greedy'],rows)
    ]);
    return t;
  } else {
    const sub=lastB.g>lastA.g?'✗ No':'⚠ Depende';
    const subCol=lastB.g>lastA.g?C.red:C.amber;
    const rows=[
      [{text:'Coste de la solución',color:C.muted},{text:lastA.g,color:C.cyan,bold:true},{text:lastB.g,color:C.pink,bold:true}],
      [{text:'Nodos explorados',color:C.muted},{text:lastA.cl.length,color:C.cyan,bold:true},{text:lastB.cl.length,color:C.pink,bold:true}],
      [{text:'Admisible',color:C.muted},{html:'<span style="color:#22c55e;font-weight:700">✓ Sí</span>'},{html:`<span style="color:${subCol};font-weight:700">${sub}</span>`}],
    ];
    return div({class:'card',style:{marginTop:'14px'}},[makeTable(['Métrica','h₁ Manhattan','h₂ 2×Manhattan'],rows)]);
  }
}

function renderP4(){
  return div({},[
    makePrompt('<strong>Greedy Best-First</strong> selecciona el nodo con menor <em>h(n)</em> únicamente — ignora completamente el coste ya pagado. <strong>A*</strong> usa <em>f = g+h</em>. Avanza los pasos y observa en paralelo: ¿cuál explora menos nodos? ¿Siempre encuentran la misma ruta? ¿La misma longitud?'),
    renderDualStep(4,asManSteps,grSteps,'A* — f = g+h','Greedy — solo h(n)',C.cyan,C.orange)
  ]);
}

function renderP5(){
  return div({},[
    makePrompt('La <strong>heurística inflada h₂ = 2×Manhattan</strong> sobreestima el coste real. Eso dirige el algoritmo más agresivamente hacia la meta, explorando menos nodos… pero puede perder la optimalidad. ¿Encuentran el mismo camino con el mismo coste?'),
    renderDualStep(5,asManSteps,asInfSteps,'h₁ = Manhattan','h₂ = 2×Manhattan',C.cyan,C.pink)

function renderP6(){
  const nodes=[[0,0],[2,0],[4,0],[0,4],[2,2],[4,2],[0,6],[6,0]].filter(([r,c])=>!inObs(r,c));
  const rows=nodes.map(([r,c])=>{
    const real=bfsReal(r,c),h1=hMan(r,c),h2=hInf(r,c);
    return{r,c,real,h1,h2,ok1:h1<=real,ok2:h2<=real};
  });
  const tblRows=rows.map(({r,c,real,h1,h2,ok1,ok2})=>[
    {text:`(${r},${c})`,color:C.text},
    {text:real===Infinity?'∞':real,color:C.text,bold:true},
    {text:h1,color:C.cyan},
    {text:h2,color:C.pink},
    {html:`<span style="color:${ok1?C.green:C.red}">${ok1?'✓':'✗'} (${h1}≤${real})</span>`},
    {html:`<span style="color:${ok2?C.green:C.red}">${ok2?'✓':'✗'} (${h2}≤${real})</span>`},
  ]);
  return div({},[
    makePrompt('Una heurística es <strong>admisible</strong> si h(n) ≤ h*(n) para todo nodo n, donde h*(n) es el coste real mínimo calculado con BFS. Si <em>nunca sobreestima</em>, A* garantiza encontrar la solución óptima. ¿Cuál de las dos es siempre admisible?'),
    div({style:{background:'rgba(6,182,212,0.12)',border:'1px solid rgba(6,182,212,0.25)',borderRadius:'6px',padding:'8px 12px',marginBottom:'12px',fontFamily:"'Courier New',monospace",fontSize:'12px'}},[
      span({style:{color:C.cyan,fontWeight:'700'}},['DEF. ADMISIBILIDAD: ']),
      span({style:{color:C.text}},['h(n) ≤ h*(n) para todo n → A* garantiza solución óptima'])
    ]),
    div({class:'card',style:{overflowX:'auto',marginBottom:'12px'}},[
      makeTable(['Nodo','h*(n) BFS','h₁=Man.','h₂=2×Man.','h₁ admisible?','h₂ admisible?'],tblRows)
    ]),
    div({class:'three-col'},[
      makeInfoBox(C.cyan,'h₁ = MANHATTAN — SIEMPRE ADMISIBLE','En rejillas con coste uniforme el camino real nunca puede ser inferior a la Distancia Manhattan, porque los obstáculos solo alargan la ruta. h₁ ≤ h* en todos los casos.'),
      makeInfoBox(C.pink,'h₂ = 2×MANHATTAN — PUEDE SOBREESTIMAR','Cuando los obstáculos fuerzan un gran rodeo, h₂ puede superar h*. Si h₂(n) > h*(n) para algún nodo, A* puede devolver un camino subóptimo.')
    ])
  ]);
}

function renderP7(){
  const pairs=[[[0,0],[1,0]],[[1,0],[2,0]],[[0,0],[0,1]],[[2,0],[2,1]],
               [[4,0],[4,1]],[[4,0],[5,0]],[[6,7],[7,7]],[[7,6],[7,7]]]
    .filter(([[r1,c1],[r2,c2]])=>canGo(r1,c1)&&canGo(r2,c2));
  const tblRows=pairs.map(([[r1,c1],[r2,c2]])=>{
    const h1n=hMan(r1,c1),h1p=hMan(r2,c2),h2n=hInf(r1,c1),h2p=hInf(r2,c2);
    const ok1=h1n<=1+h1p,ok2=h2n<=1+h2p;
    return[
      {text:`(${r1},${c1})`,color:C.text},{text:`(${r2},${c2})`,color:C.text},
      {text:h1n,color:C.cyan},{text:'1',color:C.muted},{text:h1p,color:C.cyan},
      {html:`<span style="color:${ok1?C.green:C.red}">${ok1?'✓':'✗'} ${h1n}≤${1+h1p}</span>`},
      {text:h2n,color:C.pink},{text:h2p,color:C.pink},
      {html:`<span style="color:${ok2?C.green:C.red}">${ok2?'✓':'✗'} ${h2n}≤${1+h2p}</span>`},
    ];
  });
  return div({},[
    makePrompt('Una heurística es <strong>consistente</strong> si cumple: h(n) ≤ c(n,n\') + h(n\') para todo par de nodos vecinos (c=1). La consistencia implica admisibilidad y garantiza que A* <strong>nunca necesita reabrir nodos ya cerrados</strong> — más eficiente.'),
    div({style:{background:'rgba(245,158,11,0.08)',border:'1px solid rgba(245,158,11,0.22)',borderRadius:'6px',padding:'8px 12px',marginBottom:'12px',fontFamily:"'Courier New',monospace",fontSize:'12px'}},[
      span({style:{color:C.amber,fontWeight:'700'}},['DEF. CONSISTENCIA: ']),
      span({style:{color:C.text}},['h(n) ≤ c(n,n\') + h(n\') → desigualdad triangular para todo par de vecinos'])
    ]),
    div({class:'card',style:{overflowX:'auto',marginBottom:'12px'}},[
      makeTable(["n","n'","h₁(n)","c","h₁(n')","h₁ cons?","h₂(n)","h₂(n')","h₂ cons?"],tblRows)
    ]),
    makeInfoBox(C.amber,'IMPLICACIÓN PARA NEGOCIO','Una heurística consistente hace que el algoritmo nunca tenga que volver atrás a reconsiderar zonas ya descartadas. En un almacén con miles de referencias, eso se traduce directamente en menor tiempo de cómputo por ruta.')
  ]);
}

  const aM=asManSteps[asManSteps.length-1];

    {lbl:'A* + h₂ (2×Manhattan)',col:C.pink,cost:aI.g,exp:aI.cl.length,opt:aI.g===aM.g?'✓':'✗',adm:'✗ No siempre',con:'✗ No siempre',path:aI.path,st:aI},
    {lbl:'Greedy Best-First',col:C.orange,cost:gr.g,exp:gr.cl.length,opt:'✗',adm:'N/A',con:'N/A',path:gr.path,st:gr},
  ];
  const tblRows=rowData.map(r=>[
    {html:`<span style="color:${r.col};font-weight:700">${r.lbl}</span>`},
    {text:r.cost,color:C.text,bold:true},
    {text:r.exp,color:C.text},
    {html:`<span style="color:${r.opt==='✓'?C.green:C.red}">${r.opt}</span>`},
    {html:`<span style="color:${r.adm.startsWith('✓')?C.green:r.adm==='N/A'?C.muted:C.red}">${r.adm}</span>`},
    {html:`<span style="color:${r.con.startsWith('✓')?C.green:r.con==='N/A'?C.muted:C.red}">${r.con}</span>`},
  ]);
  const conclusions=[
    'A* con heurística admisible siempre devuelve la solución óptima (Teorema de completitud de A*).',
    'Una heurística más informada (mayor h sin sobreestimar) reduce nodos explorados y mejora eficiencia.',
    'Si h sobreestima → puede acelerar la búsqueda pero pierde la garantía de optimalidad.',
    'Greedy es el más veloz pero no garantiza el camino de coste mínimo.',
    'La consistencia garantiza que A* nunca necesita reabrir nodos cerrados — eficiencia adicional.',
    'En negocio: la elección de heurística es una decisión de trade-off, no solo técnica.',
  ];
  return div({},[
    makePrompt('¡Has completado el taller! Esta tabla integra todos los conceptos. Reflexiona: en un almacén real con miles de ubicaciones, <strong>¿cuándo priorizarías velocidad sobre optimalidad?</strong> ¿Cómo argumentarías tu decisión ante un director de operaciones?'),
    div({class:'card',style:{overflowX:'auto',marginBottom:'14px'}},[
      makeTable(['Algoritmo','Coste','Expl.','Óptimo','Admisible','Consistente'],tblRows)
    ]),
    div({class:'three-col',style:{marginBottom:'14px'}},rowData.map(r=>
      div({style:{flex:'1',minWidth:'160px'}},[
        div({style:{color:r.col,fontSize:'9px',fontFamily:"'Courier New',monospace",marginBottom:'5px',fontWeight:'700'}},[r.lbl]),
        makeGrid(r.st,r.path,19)
      ])
    )),
    div({style:{background:'rgba(245,158,11,0.07)',border:'1px solid rgba(245,158,11,0.22)',borderRadius:'8px',padding:'14px'}},[
      div({style:{color:C.amber,fontFamily:"'Courier New',monospace",fontSize:'10px',fontWeight:'700',marginBottom:'10px',letterSpacing:'2px'}},['CONCLUSIONES CLAVE']),
      ...conclusions.map(t=>div({class:'conclusion-row'},[
        span({class:'conclusion-arrow'},['→']),
        span({class:'conclusion-text'},[t])
      ]))
    ])
  ]);
}

// ═══════════════════════════════════════
// NAVEGACIÓN Y RENDER
// ═══════════════════════════════════════
const renderers=[renderP0,renderP1,renderP2,renderP3,renderP4,renderP5,renderP6,renderP7,renderP8];

function renderPhase(){
  const content=document.getElementById('content');
  content.innerHTML='';
  content.appendChild(renderers[currentPhase]());

  document.getElementById('phase-counter').textContent=`FASE ${currentPhase+1} DE ${PHASES.length}`;
  document.getElementById('phase-name').textContent=PHASES[currentPhase].label;

  document.getElementById('btn-prev').disabled=currentPhase===0;
  document.getElementById('btn-next').disabled=currentPhase===PHASES.length-1;

  // tabs
  const tabs=document.getElementById('tabs');
  tabs.innerHTML='';
  PHASES.forEach((_,i)=>{
    const btn=document.createElement('button');
    btn.className='tab-btn'+(i===currentPhase?' active':i<currentPhase?' done':'');
    btn.textContent=`${i+1} · ${PHASES[i].label}`;
    btn.title=PHASES[i].label;
    btn.addEventListener('click',()=>{currentPhase=i;renderPhase();window.scrollTo(0,0);});
    tabs.appendChild(btn);
  });

  // dots
  const dots=document.getElementById('dots');
  dots.innerHTML='';
  PHASES.forEach((_,i)=>{
    const d=document.createElement('div');
    d.className='dot'+(i===currentPhase?' active':i<currentPhase?' done':' todo');
    d.addEventListener('click',()=>{currentPhase=i;renderPhase();window.scrollTo(0,0);});
    dots.appendChild(d);
  });
}

function navigate(dir){
  currentPhase=Math.max(0,Math.min(PHASES.length-1,currentPhase+dir));
  renderPhase();
  window.scrollTo(0,0);
}

// Init
renderPhase();
